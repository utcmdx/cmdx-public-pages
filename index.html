<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CMDX · プロトタイプ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body { margin: 0; }

  /* --- Sticky nav ----------------------------------------------------- */
  .nav {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 18px 48px;
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(20px) saturate(120%);
    border-bottom: 1px solid var(--line);
  }
  .nav-mark { font-size: 16px; font-weight: 400; letter-spacing: 0.04em; }
  .nav-mark .sub { font-size: 11px; color: var(--ink-3); letter-spacing: 0.12em; margin-left: 14px; }
  .nav-meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.08em; font-variant-numeric: tabular-nums; }

  main { padding: 0 48px; max-width: var(--grid-max); margin: 0 auto; }

  /* --- Index list ----------------------------------------------------- */
  .index { margin: 64px 0 120px; }
  .index-head {
    display: grid; grid-template-columns: 56px 1fr 200px; gap: 32px;
    padding: 20px 0; border-bottom: 1px solid var(--line);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3);
  }
  .row {
    display: grid; grid-template-columns: 56px 1fr 200px; gap: 32px; align-items: start;
    padding: 36px 0; border-bottom: 1px solid var(--line);
    text-decoration: none; color: inherit;
    transition: background var(--dur-base) var(--ease);
  }
  .row:hover { background: var(--paper-2); }
  .row .n { font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); padding-top: 8px; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
  .row .body { min-width: 0; }
  .row .t {
    font-size: clamp(24px, 3vw, 34px); font-weight: 400; line-height: 1.25; letter-spacing: -0.015em;
    display: inline-flex; align-items: baseline; gap: 16px;
  }
  .row .t .arrow { font-size: 18px; color: var(--ink-3); transition: transform var(--dur-base) var(--ease), color var(--dur-base) var(--ease); }
  .row:hover .t .arrow { transform: translateX(6px); color: var(--ink); }
  .row .d { margin-top: 14px; max-width: 60ch; font-size: 14px; font-weight: 300; line-height: 1.7; color: var(--ink-2); }
  .row .meta {
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em;
    line-height: 1.9; padding-top: 10px; font-variant-numeric: tabular-nums;
  }
  .row .meta span { display: block; }
  .row .meta .k { color: var(--ink-4); }

  /* --- Footer --------------------------------------------------------- */
  footer {
    border-top: 1px solid var(--line);
    padding: 40px 48px 64px; max-width: var(--grid-max); margin: 0 auto;
    display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 16px;
    font-size: 12px; color: var(--ink-3);
  }
  footer .org { font-size: 12px; color: var(--ink-2); }

  @media (max-width: 720px) {
    .nav, main, footer { padding-left: 24px; padding-right: 24px; }
    .index-head { display: none; }
    .row { grid-template-columns: 36px 1fr; gap: 20px; }
    .row .meta { grid-column: 2; padding-top: 4px; }
  }
</style>
</head>
<body>
  <nav class="nav">
    <div class="nav-mark">CMDX<span class="sub">Campus Management DX</span></div>
    <div class="nav-meta">PROTOTYPES</div>
  </nav>

  <main>
    <section class="index">
      <div class="index-head">
        <div>No.</div>
        <div>Title</div>
        <div>Type / Updated</div>
      </div>

      <a class="row" href="hongo-model-study/">
        <div class="n">01</div>
        <div class="body">
          <div class="t">本郷キャンパス 3Dモデルビューア<span class="arrow">→</span></div>
          <div class="d">本郷キャンパス周辺の地形と建物ボリュームを三次元で表示し、回転・ズームで観察できるブラウザビューア。Blender で構成したモデルを glTF へ書き出し、Web 上で軽量に描画する。</div>
        </div>
        <div class="meta">
          <span><span class="k">type</span> 3D / glTF</span>
          <span><span class="k">updated</span> 2026–06</span>
        </div>
      </a>

      <!-- 新しいプロトタイプはこの形式で行を追加する -->

    </section>
  </main>

  <footer>
    <div class="org">東京大学 大学院工学系研究科 建築学専攻 ／ キャンパスマネジメントDX 社会連携講座</div>
    <div class="nav-meta">utcmdx.github.io</div>
  </footer>
</body>
</html>
