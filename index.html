<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hongo 4D</title>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: #1a1a1a; font-family: system-ui, sans-serif; }
    model-viewer { width: 100%; height: 100%; --poster-color: #1a1a1a; }
    .title {
      position: fixed; top: 16px; left: 20px; z-index: 1;
      color: #fff; font-size: 14px; letter-spacing: .08em; opacity: .8;
      pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    .hint {
      position: fixed; bottom: 14px; left: 0; right: 0; z-index: 1; text-align: center;
      color: #fff; font-size: 12px; opacity: .55; pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="title">HONGO 4D</div>
  <model-viewer
    src="hongo.glb"
    alt="Hongo 3D model"
    camera-controls
    camera-orbit="0deg 70deg 65%"
    auto-rotate
    auto-rotate-delay="3000"
    rotation-per-second="12deg"
    touch-action="pan-y"
    interaction-prompt="none"
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">
  </model-viewer>
  <div class="hint">ドラッグで回転 / ホイール・ピンチでズーム / 右ドラッグで移動</div>
</body>
</html>
